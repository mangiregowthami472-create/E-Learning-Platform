<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - E-Learning Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="STYLE.css">
    <style>
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            margin-top: 2rem;
        }
        .profile-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .completed-courses {
            grid-column: span 2;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 1rem; text-align: left; border-bottom: 1px solid #eee; }
    </style>
</head>
<body>
    <header>
        <h1>🎓 E-Learning Platform</h1>
    </header>
    
    <nav>
        <ul>
            <li><a href="DASHBOARD.html">Dashboard</a></li>
            <li><a href="COURSES.html">Courses</a></li>
            <li><a href="QUIZ.html">Quiz</a></li>
            <li><a href="ABOUT.html" class="active">Profile</a></li>
        </ul>
    </nav>
    
    <main>
        <nav class="breadcrumb"></nav>
        
        <div class="profile-grid">
            <div class="profile-card">
                <h2>👤 Learner Profile</h2>
                <p><strong>Name:</strong> <span id="userName"></span></p>
                <p><strong>Email:</strong> <span id="userEmail"></span></p>
                <p><strong>Total Courses:</strong> 2</p>
                <p><strong>Completed:</strong> <span id="completedCount">0</span></p>
            </div>
            
            <div class="profile-card">
                <h2>📊 Quiz Results</h2>
                <div id="quizResults"></div>
            </div>
            
           
        </div>
    </main>   
    <footer>
        <p>&copy; 2026 E-Learning Platform. All rights reserved.</p>
    </footer>

    <script src="SCRIPT.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userData = initStorage();
            document.getElementById('userName').textContent = userData.name;
            document.getElementById('userEmail').textContent = userData.email;
            document.getElementById('completedCount').textContent = userData.completedCourses.length;
            const quizResultsDiv = document.getElementById('quizResults');
            if (userData.quizScores['javascript-quiz']) {
                const score = userData.quizScores['javascript-quiz'];
                quizResultsDiv.innerHTML = `
                    <p>JavaScript Quiz: ${score}/5 (${(score/5*100).toFixed(1)}%)</p>
                `;
            } else {
                quizResultsDiv.innerHTML = '<p>No quiz results yet. Take a quiz!</p>';
            }                
        });
    </script>
</body>
</html>
