<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - E-Learning Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="STYLE.css">
    <style>
        .dashboard-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }
        .course-card {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .course-card:hover {
            transform: translateY(-5px);
        }
        progress { width: 100%; height: 20px; }
    </style>
</head>
<body>
    <header>
        <h1>🎓 E-Learning Platform</h1>
    </header>
    
    <nav>
        <ul>
            <li><a href="DASHBOARD.html" class="active">Dashboard</a></li>
            <li><a href="COURSES.html">Courses</a></li>
            <li><a href="QUIZ.html">Quiz</a></li>
            <li><a href="ABOUT.html">Profile</a></li>
        </ul>
    </nav>
    
    <main>
        <nav class="breadcrumb"></nav>
        
        <section class="dashboard-grid">
            <div class="course-card">
                <h2>Web Development</h2>
                <p>Master the fundamentals of web development</p>
                <progress value="75" max="100"></progress>
                <span>75% Complete</span>
                <br><br>
                <a href="courses.html#web-development" class="btn btn-primary">Continue Course</a>
            </div>
            
            <div class="course-card">
                <h2>JavaScript</h2>
                <p>Advanced JavaScript concepts and patterns</p>
                <progress value="40" max="100"></progress>
                <span>40% Complete</span>
                <br><br>
                <a href="courses.html#javascript" class="btn btn-primary">Start Course</a>
            </div>
            
           
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 E-Learning Platform. All rights reserved.</p>
    </footer>

    <script src="SCRIPT.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const userData = initStorage();
            document.querySelectorAll('progress').forEach((prog, i) => {
                const courseId = ['web-development', 'javascript'][i];
                prog.value = coursesData[courseId].progress;
                prog.parentElement.querySelector('span').textContent = 
                    coursesData[courseId].completed ? '✅ Completed' : 
                    `${coursesData[courseId].progress}% Complete`;
            });
        });
    </script>
</body>
</html>
