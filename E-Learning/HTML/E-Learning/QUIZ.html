<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz - E-Learning Platform</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="STYLE.css">
    <style>
        .quiz-container { max-width: 800px; margin: 0 auto; }
        .question { margin-bottom: 2rem; }
        .options label { display: block; margin: 0.5rem 0; cursor: pointer; }
        #results { display: none; background: #f8f9fa; padding: 2rem; border-radius: 10px; }
        .loading { text-align: center; font-size: 1.2rem; color: #666; }
    </style>
</head>
<body>
    <header>
        <h1>🎓 E-Learning Platform</h1>
    </header>
    
    <nav>
        <ul>
            <li><a href="DASHBOARD.html">Dashboard</a></li>
            <li><a href="COURSES.html">Courses</a></li>
            <li><a href="QUIZ.html" class="active">Quiz</a></li>
            <li><a href="ABOUT.html">Profile</a></li>
        </ul>
    </nav>
    
    <main>
        <nav class="breadcrumb"></nav>
        
        <section class="quiz-container">
            <div id="loading" class="loading">Loading quiz questions...</div>
            <div id="quiz" style="display: none;">
                <h2>JavaScript Quiz</h2>
                <form id="quizForm">
                    <div id="questions"></div>
                    <button type="submit" class="btn btn-success btn-lg w-100 mt-4">Submit Quiz</button>
                </form>
            </div>
            <div id="results">
                <h2>Quiz Results</h2>
                <div id="score"></div>
                <div id="feedback"></div>
                <progress id="scoreProgress" style="width: 100%; height: 20px;"></progress>
                <a href="DASHBOARD.html" class="btn btn-primary mt-3">Back to Dashboard</a>
            </div>
        </section>
    </main>   
    <footer>
        <p>&copy; 2026 E-Learning Platform. All rights reserved.</p>
    </footer>

    <script src="SCRIPT.js"></script>
    <script>
        const quizQuestions = [
            {
                question: "What does DOM stand for?",
                options: ["Document Object Model", "Data Object Method", "Dynamic Object Module", "Document Order Model"],
                correct: 0
            },
            {
                question: "Which method is used for async operations?",
                options: ["setTimeout()", "addEventListener()", "querySelector()", "createElement()"],
                correct: 0
            },
            {
                question: "What does async/await replace?",
                options: [".then() chains", "for loops", "if statements", "switch statements"],
                correct: 0
            },
            {
                question: "localStorage stores data as?",
                options: ["JSON strings", "JavaScript objects", "Binary data", "XML format"],
                correct: 0
            },
            {
                question: "Which event fires on form submission?",
                options: ["onsubmit", "onclick", "onchange", "onload"],
                correct: 0
            }
        ];
        async function loadQuiz() {
            document.getElementById('loading').textContent = 'Loading quiz questions...';
            await new Promise(resolve => setTimeout(resolve, 2000));           
            document.getElementById('loading').style.display = 'none';
            document.getElementById('quiz').style.display = 'block';
            generateQuestions();
        }

        function generateQuestions() {
            const container = document.getElementById('questions');
            quizQuestions.forEach((q, index) => {
                const questionDiv = document.createElement('div');
                questionDiv.className = 'question';
                questionDiv.innerHTML = `
                    <h4>${index + 1}. ${q.question}</h4>
                    <div class="options">
                        ${q.options.map((option, i) => `
                            <label>
                                <input type="radio" name="q${index}" value="${i}"> ${option}
                            </label>
                        `).join('')}
                    </div>
                `;
                container.appendChild(questionDiv);
            });
        }
        function calculateGrade(score, total) {
            const percentage = (score / total) * 100;
            
            if (percentage >= 90) return { grade: 'A', message: 'Excellent!' };
            else if (percentage >= 80) return { grade: 'B', message: 'Great job!' };
            else if (percentage >= 70) return { grade: 'C', message: 'Good work!' };
            else if (percentage >= 60) return { grade: 'D', message: 'Keep studying!' };
            else return { grade: 'F', message: 'Please review the material.' };
        }
        function getFeedback(score) {
            switch (true) {
                case (score === 5): return "Perfect score! 🎉";
                case (score >= 4): return "Excellent performance! 👏";
                case (score >= 3): return "Good job! Keep it up! 👍";
                case (score >= 2): return "Not bad! Practice more. 📚";
                default: return "Time to review the material! 🔄";
            }
        }
        document.getElementById('quizForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            let score = 0;
            quizQuestions.forEach((q, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                if (selected && parseInt(selected.value) === q.correct) {
                    score++;
                }
            });
            const userData = JSON.parse(localStorage.getItem('eLearningUser'));
            userData.quizScores['javascript-quiz'] = score;
            localStorage.setItem('eLearningUser', JSON.stringify(userData));
            const percentage = (score / quizQuestions.length) * 100;
            const gradeInfo = calculateGrade(score, quizQuestions.length);            
            document.getElementById('score').innerHTML = `
                <h3>You scored ${score}/${quizQuestions.length} (${percentage.toFixed(1)}%)</h3>
                <h4>Grade: ${gradeInfo.grade}</h4>
            `;
            document.getElementById('feedback').textContent = `${getFeedback(score)} ${gradeInfo.message}`;
            document.getElementById('scoreProgress').value = percentage;
            
            document.getElementById('quiz').style.display = 'none';
            document.getElementById('results').style.display = 'block';
        });
        document.addEventListener('DOMContentLoaded', loadQuiz);
    </script>
</body>
</html>
