<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dashboard - LearnHub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css"> <!-- yeah I named it style.css -->
</head>
<body>
    <header class="bg-primary text-white p-3">
        <div class="container">
            <h1>LearnHub Dashboard 🎓</h1>
        </div>
    </header>

    <!-- Nav everywhere - copy paste win -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
        <div class="container">
            <ul class="navbar-nav">
                <li class="nav-item"><a class="nav-link" href="dashboard.html">🏠 Home</a></li>
                <li class="nav-item"><a class="nav-link" href="courses.html">📚 Courses</a></li>
                <li class="nav-item"><a class="nav-link" href="quiz.html">❓ Quiz</a></li>
                <li class="nav-item"><a class="nav-link" href="profile.html">👤 Profile</a></li>
            </ul>
        </div>
    </nav>

    <div class="container my-5">
        <!-- Breadcrumb - had to google how to do this properly -->
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb bg-light p-2 rounded">
                <li class="breadcrumb-item active">Dashboard</li>
            </ol>
        </nav>

        <div class="row">
            <div class="col-md-6 mb-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>Courses Available</h5>
                        <h2 id="courseNum">0</h2>
                        <small class="text-muted">Total courses</small>
                    </div>
                </div>
            </div>
            <div class="col-md-6 mb-3">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <h5>Your Progress</h5>
                        <div class="progress mb-2" style="height:25px;">
                            <div class="progress-bar bg-success" id="progBar" style="width:0%"></div>
                        </div>
                        <div id="progText">0%</div>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="mt-4 mb-3">Recent Courses</h3>
        <div class="row" id="courseCards">
            <!-- JS fills this -->
        </div>
    </div>

    <footer class="bg-dark text-white text-center py-4 mt-5">
        <div class="container">
            <p>© 2026 LearnHub - Made with 💻</p>
        </div>
    </footer>

    <script src="dashboard.js"></script>
</body>
</html>
